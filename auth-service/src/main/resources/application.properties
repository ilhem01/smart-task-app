spring.application.name=auth-service

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5433/auth_db}
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

server.port=8081
logging.level.org.springframework.boot.context.config=DEBUG

# SPA origin for CORS (set CORS_ALLOWED_ORIGIN on EC2, e.g. http://YOUR_PUBLIC_IP:3000 — no hardcoded IP in code)
app.cors.allowed-origin=${CORS_ALLOWED_ORIGIN:http://localhost:3000}

# Springdoc / Swagger UI
springdoc.swagger-ui.path=/swagger-ui.html
