services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB_AUTH:-auth_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init-taskdb.sql:/docker-entrypoint-initdb.d/02-init-taskdb.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  auth-service:
    build:
      context: ./auth-service
      dockerfile: Dockerfile
    ports:
      - "8081:8081"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB_AUTH:-auth_db}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-postgres}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  task-service:
    build:
      context: ./task-service
      dockerfile: Dockerfile
    ports:
      - "8082:8082"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB_TASK:-taskdb}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-postgres}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  api-gateway:
    build:
      context: ./api-gateway
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      AUTH_SERVICE_URI: http://auth-service:8081
      TASK_SERVICE_URI: http://task-service:8082
      CORS_ALLOWED_ORIGIN: ${CORS_ALLOWED_ORIGIN:-http://localhost:4200}
      JWT_SECRET: ${JWT_SECRET:-smart-task-auth-service-secret-key-2026}
    depends_on:
      - auth-service
      - task-service
    restart: unless-stopped

  frontend:
    build:
      context: ./smart-task-frontend
      dockerfile: Dockerfile
    ports:
      - "4200:80"
    depends_on:
      - api-gateway
    restart: unless-stopped

  n8n:
    image: n8nio/n8n:latest
    ports:
      - "5678:5678"
    environment:
      N8N_HOST: localhost
      N8N_PORT: 5678
      N8N_PROTOCOL: http
      WEBHOOK_URL: http://localhost:5678/
      TZ: UTC
    volumes:
      - n8n_data:/home/node/.n8n
    restart: unless-stopped

  ci-backend-tests:
    image: maven:3.9.9-eclipse-temurin-17
    working_dir: /workspace
    profiles: ["ci"]
    command:
      - sh
      - -ec
      - |
        cd auth-service
        mvn -B clean test
        cd ../task-service
        mvn -B clean test
        cd ../api-gateway
        mvn -B clean test
    volumes:
      - ./:/workspace
      - maven_cache:/root/.m2
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB_TASK:-taskdb}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-postgres}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-postgres}

  ci-frontend-tests:
    image: cypress/included:latest
    entrypoint: ["/bin/sh", "-c"]
    working_dir: /workspace
    profiles:
      - ci
    volumes:
      - .:/workspace
    command: "cd smart-task-frontend && npm ci && npx cypress run"
    tty: false
    stdin_open: false

volumes:
  postgres_data:
  maven_cache:
  n8n_data:

