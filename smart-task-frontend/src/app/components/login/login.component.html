<div class="auth-page">
  <div class="auth-card">
    <h1 class="auth-title">Sign in</h1>
    <p class="auth-subtitle">Use your account to access tasks.</p>

    <form class="auth-form" (ngSubmit)="onLogin()">
      <div class="form-group">
        <label for="login-username">Username</label>
        <input
          id="login-username"
          class="input-field"
          [(ngModel)]="username"
          name="username"
          type="text"
          autocomplete="username"
        />
      </div>

      <div class="form-group">
        <label for="login-password">Password</label>
        <input
          id="login-password"
          class="input-field"
          [(ngModel)]="password"
          name="password"
          type="password"
          autocomplete="current-password"
        />
      </div>

      <button type="submit" class="btn btn-primary btn-block" [disabled]="isLoading">
        <span *ngIf="isLoading" class="spinner spinner-inline" aria-hidden="true"></span>
        {{ isLoading ? 'Signing in…' : 'Login' }}
      </button>

      <p *ngIf="errorMessage" class="msg-error">{{ errorMessage }}</p>
    </form>
  </div>
</div>
