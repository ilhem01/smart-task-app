<div class="auth-page">
  <div class="auth-card">
    <h1 class="auth-title">Create account</h1>
    <p class="auth-subtitle">Register to start managing tasks.</p>

    <form class="auth-form" (ngSubmit)="onRegister()">
      <div class="form-group">
        <label for="reg-username">Username</label>
        <input
          id="reg-username"
          class="input-field"
          [(ngModel)]="username"
          name="username"
          type="text"
          autocomplete="username"
        />
      </div>

      <div class="form-group">
        <label for="reg-password">Password</label>
        <input
          id="reg-password"
          class="input-field"
          [(ngModel)]="password"
          name="password"
          type="password"
          autocomplete="new-password"
        />
      </div>

      <button type="submit" class="btn btn-primary btn-block" [disabled]="isLoading">
        <span *ngIf="isLoading" class="spinner spinner-inline" aria-hidden="true"></span>
        {{ isLoading ? 'Creating account…' : 'Register' }}
      </button>

      <p *ngIf="successMessage" class="msg-success">{{ successMessage }}</p>
      <p *ngIf="errorMessage" class="msg-error">{{ errorMessage }}</p>
    </form>
  </div>
</div>
