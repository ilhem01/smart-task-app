server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      globalcors:
        add-to-simple-url-handler-mapping: true
        cors-configurations:
          "[/**]":
            allowedOrigins:
              - "${CORS_ALLOWED_ORIGIN:http://3.68.189.37:3000}"
            allowedHeaders:
              - "*"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
            allowCredentials: true
            maxAge: 3600
      routes:
        - id: auth-openapi-proxy
          uri: ${AUTH_SERVICE_URI:http://localhost:8081}
          predicates:
            - Path=/openapi/auth/**
          filters:
            - RewritePath=/openapi/auth/(?<segment>.*), /$\{segment}
        - id: task-openapi-proxy
          uri: ${TASK_SERVICE_URI:http://localhost:8082}
          predicates:
            - Path=/openapi/tasks/**
          filters:
            - RewritePath=/openapi/tasks/(?<segment>.*), /$\{segment}
        - id: auth-service
          uri: ${AUTH_SERVICE_URI:http://localhost:8081}
          predicates:
            - Path=/auth/**
        - id: task-service
          uri: ${TASK_SERVICE_URI:http://localhost:8082}
          predicates:
            - Path=/tasks/**

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    urls:
      - name: Auth Service
        url: /openapi/auth/v3/api-docs
      - name: Task Service
        url: /openapi/tasks/v3/api-docs
  api-docs:
    path: /v3/api-docs

jwt:
  secret: ${JWT_SECRET:smart-task-auth-service-secret-key-2026}

logging:
  level:
    org.springframework.cloud.gateway: DEBUG
